<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cargador Átomo</title>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #0d1117;
}

.atom {
  position: relative;
  width: 150px;
  height: 150px;
}

.nucleus {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 20px;
  height: 20px;
  background: #58a6ff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.orbit {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 2px solid rgba(88, 166, 255, 0.3);
  border-radius: 50%;
  animation: rotate 2s linear infinite;
}

.orbit:nth-child(2) {
  transform: rotate(60deg);
  animation-duration: 3s;
}

.orbit:nth-child(3) {
  transform: rotate(-60deg);
  animation-duration: 4s;
}

.electron {
  position: absolute;
  top: -6px;
  left: 50%;
  width: 12px;
  height: 12px;
  background: #f78166;
  border-radius: 50%;
  transform: translateX(-50%);
}

@keyframes rotate {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

.loading-text {
  position: absolute;
  bottom: -40px;
  width: 100%;
  text-align: center;
  color: #c9d1d9;
  font-family: Arial, sans-serif;
  font-size: 14px;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>
</head>
<body>

<div class="atom">
  <div class="orbit">
    <div class="electron"></div>
  </div>
  <div class="orbit">
    <div class="electron"></div>
  </div>
  <div class="orbit">
    <div class="electron"></div>
  </div>
  <div class="nucleus"></div>
  <div class="loading-text">Cargando...</div>
</div>

</body>
</html>
