<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Formulario de Contacto</title>
    <link rel="stylesheet" href="style/formularioreto.css">
</head>
<body>

    <div class="container">
        <form class="form">
            
            <div class="input-group">
                <label>Nombre</label>
                <input type="text" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" required>
            </div>

            <div class="input-group">
                <label>Mensaje</label>
                <textarea rows="3" required></textarea>
            </div>

            <button type="submit">Enviar Mensaje</button>

        </form>
    </div>

</body>
</html>
